const fC=a=>(!a&&a!==0)?'Rs. 0.00':'Rs. '+Number(a).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fD=d=>{if(!d)return'—';try{return new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return String(d)}};
const fDT=d=>{if(!d)return'—';try{const x=new Date(d);return x.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})+', '+x.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}catch(e){return String(d)}};
const RET_REASONS=['Defective product / දෝෂ සහිත භාණ්ඩය','Wrong item delivered / වැරදි භාණ්ඩය','Customer changed mind / පාරිභෝගිකයා අදහස වෙනස් කළා','Damaged in transit / ප්‍රවාහනයේදී හානි','Not as described / විස්තරයට නොගැලපේ','Warranty claim / වගකීම් හිමිකම','Other / වෙනත්'];
const isValidPhone=(phone)=>{const cleaned=String(phone||'').replace(/\D/g,'');return cleaned.length>=9&&cleaned.length<=12};

const buildWhatsAppURL=(phone,receipt)=>{
  let ph=String(phone||'').replace(/\D/g,'');
  if(ph.startsWith('0'))ph='94'+ph.substring(1);
  else if(!ph.startsWith('94'))ph='94'+ph;
  let msg=`🧾 *LIYANAGE ELECTRONICS*\n📋 Invoice: ${receipt.saleId}\n📅 ${fD(receipt.date)}\n${'─'.repeat(24)}\n`;
  receipt.items.forEach(it=>{msg+=`▸ ${it.productName}\n  ${it.qty} × ${fC(it.unitPrice)} = ${fC(it.lineTotal)}\n`});
  msg+=`${'─'.repeat(24)}\n`;
  if(receipt.discountPct>0)msg+=`💰 Discount (${receipt.discountPct}%): -${fC(receipt.discountAmount)}\n`;
  msg+=`✅ *TOTAL: ${fC(receipt.grandTotal)}*\n💳 Paid by: ${receipt.paymentMethod}\n`;
  if(receipt.paymentMethod==='Cash'&&receipt.cashTendered>0){msg+=`💵 Cash: ${fC(receipt.cashTendered)}\n🔄 Change: ${fC(receipt.change)}\n`}
  msg+=`\nThank you for your purchase!\nඅපේ සාප්පුවෙන් මිලදී ගැනීමට ස්තූතියි!\n\n_Powered by Mahesh Web App Solution_`;
  return `https://wa.me/${ph}?text=${encodeURIComponent(msg)}`;
};

/* ── DASHBOARD ── */
const Dashboard=({data,loading,setTab})=>{
  const s=useMemo(()=>{if(!data?.sales) return null;const r=data.sales.reduce((a,x)=>a+(Number(x.TotalAmount)||0),0);const u=[...new Set(data.sales.map(x=>x.SaleID))].length;const p=data.products?.length||0;const l=data.products?.filter(x=>x.Status==='Low Stock'||x.StockQty<=x.MinStockLevel).length||0;const tr=data.returns?.length||0;const ra=data.returns?.reduce((a,x)=>a+(Number(x.RefundAmount)||0),0)||0;const profit=data.sales.reduce((a,x)=>{const pr=data.products?.find(p=>p.ProductID===x.ProductID);return a+((Number(x.TotalAmount)||0)-(pr?(Number(pr.CostPrice)||0)*Number(x.Qty):0))},0);return{r,u,p,l,tr,ra,profit}},[data]);
  const recent=useMemo(()=>{if(!data?.sales) return [];const g={};data.sales.forEach(s=>{if(!g[s.SaleID])g[s.SaleID]={id:s.SaleID,date:s.Date,cust:s.CustomerName,pay:s.PaymentMethod,items:[],total:0};g[s.SaleID].items.push(s);g[s.SaleID].total+=Number(s.TotalAmount)||0});return Object.values(g).sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6)},[data]);
  const lowItems=useMemo(()=>data?.products?.filter(p=>p.Status==='Low Stock'||p.StockQty<=p.MinStockLevel)||[],[data]);
  const catBreakdown=useMemo(()=>{if(!data?.sales) return [];const m={};data.sales.forEach(s=>{m[s.Category]=(m[s.Category]||0)+(Number(s.TotalAmount)||0)});return Object.entries(m).sort((a,b)=>b[1]-a[1])},[data]);

  if(loading||!s) return <div className="space-y-5"><div className="grid grid-cols-2 xl:grid-cols-4 gap-3 sm:gap-4"><SkC/><SkC/><SkC/><SkC/></div><SkT/></div>;

  return (<div className="space-y-5 animate-fade-in">
    <div className="grid grid-cols-2 xl:grid-cols-4 gap-3 sm:gap-4">
      <SC title="Revenue" si="මුළු ආදායම" value={fC(s.r)} sub={`${s.u} transactions`} icon="dollar-sign" grad="from-emerald-400 to-emerald-600"/>
      <SC title="Profit" si="ඇස්තමේන්තු ලාභය" value={fC(s.profit)} sub="Estimated" icon="trending-up" grad="from-brand-400 to-brand-600" delay={80}/>
      <SC title="Products" si="සියලු භාණ්ඩ" value={s.p} sub={`${s.l} low stock`} icon="package" grad="from-violet-400 to-violet-600" delay={160}/>
      <SC title="Returns" si="ආපසු ලැබීම්" value={s.tr} sub={fC(s.ra)} icon="rotate-ccw" grad="from-amber-400 to-orange-500" delay={240}/>
    </div>

    <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 animate-slide-up" style={{animationDelay:'280ms'}}>
      {[{t:'new-sale',l:'New Sale',s:'නව අලෙවිය',i:'shopping-cart',g:'from-emerald-500 to-emerald-600',sh:'shadow-emerald-500/20'},{t:'add-product',l:'Add Item',s:'නව භාණ්ඩ',i:'plus',g:'from-brand-500 to-brand-600',sh:'shadow-brand-500/20'},{t:'returns',l:'Return',s:'ආපසු',i:'rotate-ccw',g:'from-amber-500 to-orange-500',sh:'shadow-amber-500/20'},{t:'warranty',l:'Warranty',s:'වගකීම්',i:'shield-check',g:'from-violet-500 to-purple-600',sh:'shadow-violet-500/20'}].map(a=>(<button key={a.t} onClick={()=>setTab(a.t)} className={`flex items-center gap-3 p-3 sm:p-4 bg-gradient-to-br ${a.g} rounded-2xl text-white shadow-lg ${a.sh} hover:shadow-xl hover:-translate-y-0.5 transition-all active:scale-95`}><div className="w-9 h-9 sm:w-10 sm:h-10 bg-white/20 rounded-xl flex items-center justify-center"><I n={a.i} s={16}/></div><div className="text-left"><p className="text-xs sm:text-sm font-bold">{a.l}</p><p className="text-[9px] sm:text-[10px] opacity-80">{a.s}</p></div></button>))}
    </div>

    {lowItems.length>0&&(<div className="bg-gradient-to-r from-rose-50 to-amber-50 rounded-2xl p-4 border border-rose-200 animate-slide-up" style={{animationDelay:'300ms'}}><div className="flex items-center gap-2 mb-3"><I n="alert-triangle" s={16} c="text-rose-500 animate-bounce-subtle"/><span className="text-sm font-bold text-rose-700">Low Stock Alerts (අඩු තොග අනතුරු ඇඟවීම්)</span></div><div className="flex gap-2 overflow-x-auto pb-1">{lowItems.map(p=>(<div key={p.ProductID} className="flex-shrink-0 bg-white rounded-xl px-3 py-2 border border-rose-200 shadow-sm hover:shadow-md transition-shadow"><p className="text-xs font-semibold text-slate-700 whitespace-nowrap">{p.ProductName}</p><div className="flex items-center gap-2 mt-1"><span className="text-lg font-extrabold text-rose-600 animate-pulse-slow">{p.StockQty}</span><span className="text-[10px] text-slate-400">/ min {p.MinStockLevel}</span></div></div>))}</div></div>)}

    <div className="grid grid-cols-1 xl:grid-cols-3 gap-4">
      <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in" style={{animationDelay:'350ms'}}><div className="px-4 sm:px-6 py-4 border-b border-slate-100"><h3 className="text-sm font-bold text-slate-800">Category Revenue (ආදායම ප්‍රවර්ගය අනුව)</h3></div><div className="p-4 space-y-3">{catBreakdown.map(([cat,amt],i)=>{const maxAmt=catBreakdown[0]?.[1]||1;const colors=['bg-brand-500','bg-emerald-500','bg-violet-500','bg-amber-500','bg-rose-500'];return(<div key={cat} className="animate-slide-left" style={{animationDelay:`${i*60}ms`}}><div className="flex justify-between text-xs mb-1"><span className="font-medium text-slate-600">{cat}</span><span className="font-bold text-slate-800">{fC(amt)}</span></div><div className="h-2.5 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${colors[i%5]} transition-all duration-700`} style={{width:`${(amt/maxAmt*100)}%`}}/></div></div>)})}</div></div>

      <div className="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-fade-in" style={{animationDelay:'200ms'}}><div className="px-4 sm:px-6 py-4 sm:py-5 border-b border-slate-100 flex items-center justify-between"><h3 className="text-sm sm:text-base font-bold text-slate-800">Recent Sales (මෑත අලෙවි)</h3><span className="text-xs font-semibold text-brand-600 bg-brand-50 px-2 sm:px-3 py-1 rounded-lg">{s.u} total</span></div>
        <div className="overflow-x-auto"><table className="w-full min-w-[500px]"><thead><tr className="bg-slate-50/80"><th className="text-left px-4 sm:px-6 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">ID</th><th className="text-left px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Date</th><th className="text-left px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Customer</th><th className="text-left px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Items</th><th className="text-left px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Amount</th></tr></thead>
          <tbody className="divide-y divide-slate-50">{recent.map(r=>(<tr key={r.id} className="rh"><td className="px-4 sm:px-6 py-3"><span className="text-xs font-bold text-brand-600 bg-brand-50 px-2 py-0.5 rounded">{r.id}</span></td><td className="px-4 py-3 text-xs text-slate-500">{fDT(r.date)}</td><td className="px-4 py-3 text-sm font-medium text-slate-700">{r.cust}</td><td className="px-4 py-3"><span className="text-sm text-slate-700">{r.items[0].ProductName.substring(0,18)}{r.items[0].ProductName.length>18?'...':''}</span>{r.items.length>1&&<span className="text-[10px] text-brand-500 ml-1">+{r.items.length-1}</span>}</td><td className="px-4 py-3 text-sm font-bold text-slate-800">{fC(r.total)}</td></tr>))}</tbody></table></div>
      </div>
    </div>
  </div>);
};

/* ── ADD PRODUCT ── */
const AddProduct=({data,loading,toast,setData,setTab})=>{
  const emptyForm={productId:'',productName:'',category:'Mobile Phones',brand:'Samsung',model:'',unitPrice:'',costPrice:'',stockQty:'',minStockLevel:'5',warrantyMonths:'12',supplier:'Samsung Sri Lanka'};
  const [form,setForm]=useState(emptyForm);
  const [errors,setErrors]=useState({});
  const [sub,setSub]=useState(false);
  const [success,setSuccess]=useState(false);

  const genId=useCallback((cat)=>{const pref={'Mobile Phones':'MOB','Laptops':'LAP','Appliances':'APP','Accessories':'ACC','Audio':'AUD','Cameras':'CAM','Gaming':'GAM','Smart Home':'SMH','Wearables':'WER','Tablets':'TAB','Printers':'PRN','Networking':'NET'};const p=pref[cat]||cat.substring(0,3).toUpperCase();const existing=(data?.products||[]).filter(x=>x.ProductID.startsWith(p)).map(x=>parseInt(x.ProductID.replace(p,''))||0);const next=(existing.length>0?Math.max(...existing):0)+1;return p+String(next).padStart(3,'0')},[data]);

  useEffect(()=>{setForm(f=>({...f,productId:genId(f.category)}))},[form.category]);

  const validate=()=>{const e={};if(!form.productName.trim())e.productName='භාණ්ඩයේ නම අවශ්‍යයි / Product name required';if(!form.unitPrice||Number(form.unitPrice)<=0)e.unitPrice='නිවැරදි විකුණුම් මිලක් අවශ්‍යයි / Valid selling price required';if(!form.costPrice||Number(form.costPrice)<=0)e.costPrice='නිවැරදි මිලදී ගැනීමේ මිලක් අවශ්‍යයි / Valid cost price required';if(Number(form.costPrice)>=Number(form.unitPrice))e.costPrice='මිලදී ගැනීමේ මිල විකුණුම් මිලට වඩා අඩු විය යුතුයි';if(!form.stockQty||Number(form.stockQty)<0)e.stockQty='නිවැරදි ප්‍රමාණයක් අවශ්‍යයි / Valid quantity required';if((data?.products||[]).find(p=>p.ProductID===form.productId))e.productId='මෙම ID දැනටමත් පවතී / ID already exists';setErrors(e);return Object.keys(e).length===0};

  const handleSubmit=async()=>{if(!validate())return;setSub(true);try{await new Promise(r=>setTimeout(r,800));const uP=Number(form.unitPrice);const cP=Number(form.costPrice);const sQ=Number(form.stockQty);const mS=Number(form.minStockLevel)||5;const wM=Number(form.warrantyMonths)||0;const status=sQ<=mS?'Low Stock':'Active';const newProduct={ProductID:form.productId,ProductName:form.productName.trim(),Category:form.category,Brand:form.brand,Model:form.model.trim(),UnitPrice:uP,CostPrice:cP,StockQty:sQ,MinStockLevel:mS,WarrantyMonths:wM,Supplier:form.supplier,DateAdded:new Date().toISOString(),Status:status};
    if(API_URL&&API_URL!=='YOUR_DEPLOYED_APPS_SCRIPT_URL_HERE'){try{const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'addProduct',data:{productId:form.productId,productName:form.productName.trim(),category:form.category,brand:form.brand,model:form.model.trim(),unitPrice:uP,costPrice:cP,stockQty:sQ,minStockLevel:mS,warrantyMonths:wM,supplier:form.supplier}})});const j=await r.json();if(!j.success){toast(j.error||'API Error','error');setSub(false);return}}catch(e){console.warn('API unavailable, saving locally')}}
    setData(prev=>({...prev,products:[...(prev.products||[]),newProduct]}));toast(`${form.productName} සාර්ථකව එකතු කරන ලදී! (${form.productId})`,'success');setSuccess(true);setTimeout(()=>{setSuccess(false);setForm({...emptyForm,productId:genId(emptyForm.category)})},2000)}catch(e){toast('Error adding product','error')}setSub(false)};

  if(loading) return <SkT/>;

  const InputField=({label,si,field,type='text',placeholder,prefix,required=true})=>(<div className="w-full"><label className="block text-xs font-semibold text-slate-600 mb-1.5">{label} {si&&<span className="text-[10px] text-slate-400 font-normal">({si})</span>}{required&&<span className="text-rose-400 ml-0.5">*</span>}</label><div className="relative">{prefix&&<span className="absolute left-3 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400">{prefix}</span>}<input type={type} value={form[field]} onChange={e=>{setForm(f=>({...f,[field]:e.target.value}));if(errors[field])setErrors(er=>({...er,[field]:undefined}))}} placeholder={placeholder} className={`w-full ${prefix?'pl-10':'pl-4'} pr-4 py-3 text-sm bg-slate-50 border ${errors[field]?'border-rose-300 bg-rose-50/30':'border-slate-200'} rounded-xl input-ring placeholder:text-slate-300 transition-colors`}/></div>{errors[field]&&<p className="text-[10px] text-rose-500 mt-1 flex items-center gap-1"><I n="alert-circle" s={10}/>{errors[field]}</p>}</div>);

  return (<div className="max-w-4xl mx-auto animate-fade-in">
    {success&&(<div className="fixed inset-0 z-[80] flex items-center justify-center"><div className="absolute inset-0 bg-emerald-900/20 backdrop-blur-sm animate-overlay"/><div className="relative bg-white rounded-3xl p-8 sm:p-12 shadow-2xl animate-modal text-center max-w-sm mx-4"><div className="w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4 animate-success-pop shadow-xl shadow-emerald-500/30"><I n="check-circle" s={36} c="text-white"/></div><h3 className="text-xl font-bold text-slate-800 mb-1">Product Added!</h3><p className="text-sm text-slate-500">භාණ්ඩය සාර්ථකව එකතු කරන ලදී</p><p className="text-xs text-brand-500 font-mono mt-3 bg-brand-50 inline-block px-3 py-1 rounded-lg">{form.productId}</p></div></div>)}

    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div className="bg-gradient-to-r from-brand-600 via-brand-700 to-violet-700 px-5 sm:px-8 py-5 sm:py-6"><div className="flex items-center gap-4"><div className="w-12 h-12 sm:w-14 sm:h-14 bg-white/20 rounded-2xl flex items-center justify-center animate-float"><I n="plus" s={24} c="text-white"/></div><div><h2 className="text-lg sm:text-xl font-bold text-white">Add New Product</h2><p className="text-xs sm:text-sm text-brand-200 mt-0.5">නව භාණ්ඩයක් ඔබේ ව්‍යාපාරයට එකතු කරන්න</p></div></div></div>
      <div className="p-5 sm:p-8 space-y-6">
        <div><div className="flex items-center gap-2 mb-4"><div className="w-7 h-7 bg-brand-100 rounded-lg flex items-center justify-center"><I n="tag" s={14} c="text-brand-600"/></div><h3 className="text-sm font-bold text-slate-700">Basic Information</h3><span className="text-[10px] text-slate-400">(මූලික තොරතුරු)</span></div>
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label className="block text-xs font-semibold text-slate-600 mb-1.5">Product ID <span className="text-[10px] text-slate-400">(ස්වයංක්‍රීයව / Auto)</span></label><input type="text" value={form.productId} onChange={e=>{setForm(f=>({...f,productId:e.target.value.toUpperCase()}));if(errors.productId)setErrors(er=>({...er,productId:undefined}))}} className={`w-full px-4 py-3 text-sm font-mono bg-slate-50 border ${errors.productId?'border-rose-300':'border-slate-200'} rounded-xl input-ring`}/>{errors.productId&&<p className="text-[10px] text-rose-500 mt-1 flex items-center gap-1"><I n="alert-circle" s={10}/>{errors.productId}</p>}</div>

/* ── NEW SALE (POS) ── */
const NewSale=({data,loading,toast,setData})=>{
  const [cart,setCart]=useState([]);const [sp,sSp]=useState('');const [aq,sAq]=useState(1);const [dp,sDp]=useState(0);const [cn,sCn]=useState('');const [cp,sCp]=useState('');const [pm,sPm]=useState('Cash');const [ct,sCt]=useState('');const [sb,sSb]=useState('Nimal');const [sub,sSub]=useState(false);const [rec,sRec]=useState(null);
  const prods=useMemo(()=>data?.products?.filter(p=>p.StockQty>0)||[],[data]);

  const totalSales=data.sales?[...new Set(data.sales.map(s=>s.SaleID))].length:0;

  return (<div className="space-y-4 animate-fade-in">
    <div className="grid grid-cols-1 sm:grid-cols-3 gap-3"><SC title="Returns" si="ආපසු ලැබීම්" value={data.returns?.length||0} icon="rotate-ccw" grad="from-amber-400 to-orange-500"/><SC title="Refunded" si="ආපසු මුදල" value={fC((data.returns||[]).reduce((s,r)=>s+(Number(r.RefundAmount)||0),0))} icon="dollar-sign" grad="from-rose-400 to-rose-600" delay={80}/><SC title="Rate" si="ආපසු අනුපාතය" value={totalSales>0?((data.returns?.length||0)/totalSales*100).toFixed(1)+'%':'0%'} icon="bar-chart" grad="from-brand-400 to-brand-600" delay={160}/></div>
    <div className="grid grid-cols-1 xl:grid-cols-5 gap-4">
      <div className="xl:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden animate-slide-left"><div className="px-4 sm:px-5 py-3 sm:py-4 bg-gradient-to-r from-amber-500 to-orange-500"><p className="text-sm font-bold text-white flex items-center gap-2"><I n="rotate-ccw" s={16}/>Process Return (ආපසු ගැනීම සකසන්න)</p></div>
        <div className="p-4 sm:p-5 space-y-4"><div className="flex gap-2"><input type="text" placeholder="Sale ID (e.g. S0003)" value={si} onChange={e=>{sSi(e.target.value);sLe('')}} onKeyDown={e=>{if(e.key==='Enter')doL()}} className="flex-1 px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl font-mono input-ring placeholder:text-slate-300"/><button onClick={doL} className="px-4 py-2.5 bg-brand-600 text-white text-sm font-bold rounded-xl active:scale-95 shadow-lg shadow-brand-500/20"><I n="search" s={14}/></button></div>
          {le&&<p className="text-xs text-rose-500 flex items-center gap-1"><I n="alert-circle" s={14}/>{le}</p>}
          {lk&&(<div className="animate-fade-in space-y-4"><div className="p-3 bg-brand-50 rounded-xl border border-brand-100"><span className="text-xs font-bold text-brand-600">{lk.id}</span><span className="text-xs text-slate-500 ml-2">{fD(lk.date)}</span><p className="text-sm font-semibold text-slate-800 mt-1">{lk.cust}</p></div>
            <select value={sp} onChange={e=>{sSp(e.target.value);sRq(1)}} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none"><option value="">— භාණ්ඩයක් තෝරන්න —</option>{lk.items.filter(i=>i.mr>0).map(i=>(<option key={i.ProductID} value={i.ProductID}>{i.ProductName} (Max:{i.mr})</option>))}</select>
            {selI&&(<React.Fragment><div className="grid grid-cols-2 gap-3"><div><label className="text-[10px] text-slate-500 font-semibold">Qty (ප්‍රමාණය)</label><input type="number" min="1" max={selI.mr} value={rq} onChange={e=>sRq(Math.max(1,Math.min(selI.mr,parseInt(e.target.value)||1)))} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring mt-1"/></div><div><label className="text-[10px] text-slate-500 font-semibold">Processed By</label><select value={pb} onChange={e=>sPb(e.target.value)} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none mt-1"><option>Nimal</option><option>Sunil</option><option>Admin</option></select></div></div>
              <select value={rs} onChange={e=>sRs(e.target.value)} className="w-full px-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring appearance-none">{RET_REASONS.map(r=><option key={r}>{r}</option>)}</select>
              <div className="p-3 bg-emerald-50 border border-emerald-200 rounded-xl flex justify-between animate-scale-in"><span className="text-sm font-semibold text-emerald-700">Refund Amount (ආපසු මුදල)</span><span className="text-lg font-extrabold text-emerald-600">{fC(rAmt)}</span></div>
              <button onClick={hSub} disabled={sub} className="w-full py-3 bg-gradient-to-r from-amber-500 to-orange-500 text-white font-bold text-sm rounded-xl disabled:opacity-50 active:scale-[.98] flex items-center justify-center gap-2 shadow-lg shadow-amber-500/20">{sub?<React.Fragment><I n="loader" s={16} c="animate-spin"/>Processing...</React.Fragment>:<React.Fragment><I n="rotate-ccw" s={16}/>Process Return</React.Fragment>}</button>
            </React.Fragment>)}
          </div>)}
        </div>
      </div>
      <div className="xl:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden"><div className="px-4 sm:px-6 py-4 border-b border-slate-100"><h3 className="text-sm sm:text-base font-bold text-slate-800">Return History (ආපසු ගැනීම් ඉතිහාසය)</h3></div>
        <div className="overflow-x-auto"><table className="w-full min-w-[500px]"><thead><tr className="bg-slate-50/80"><th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">ID</th><th className="text-left px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Product</th><th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Qty</th><th className="text-right px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Refund</th><th className="text-center px-4 py-3 text-[10px] font-semibold text-slate-500 uppercase">Status</th></tr></thead>
          <tbody>{hist.length===0?<tr><td colSpan="5" className="px-6 py-12 text-center text-sm text-slate-400">ආපසු ගැනීම් නොමැත / No returns yet</td></tr>:hist.map(r=>(<tr key={r.ReturnID} className="rh border-b border-slate-50"><td className="px-4 py-3"><span className="text-xs font-bold text-amber-600 bg-amber-50 px-1.5 py-0.5 rounded">{r.ReturnID}</span><span className="text-[10px] text-slate-400 ml-1">{r.SaleID}</span><p className="text-[10px] text-slate-300 mt-0.5">{fD(r.Date)}</p></td><td className="px-4 py-3 text-sm text-slate-700 truncate max-w-[140px]">{r.ProductName}</td><td className="px-4 py-3 text-center text-sm font-bold">{r.Qty}</td><td className="px-4 py-3 text-right text-sm font-bold text-rose-600">{fC(r.RefundAmount)}</td><td className="px-4 py-3 text-center"><span className="text-[10px] font-semibold text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full border border-emerald-200">✓ Done</span></td></tr>))}</tbody></table></div>
      </div>
    </div>
  </div>);
};

/* ── WARRANTY ── */
const Warranty=({data,loading})=>{
  const [q,sQ]=useState('');const [sf,sSf]=useState('All');
  const recs=useMemo(()=>{if(!data?.sales||!data?.products)return[];const now=new Date();const seen=new Set();return data.sales.map((sale,saleIdx)=>{const prod=data.products.find(p=>p.ProductID===sale.ProductID);if(!prod||!Number(prod.WarrantyMonths))return null;const sd=new Date(sale.Date);const ex=new Date(sd);ex.setMonth(ex.getMonth()+Number(prod.WarrantyMonths));const dl=Math.ceil((ex-now)/864e5);const td=Math.ceil((ex-sd)/864e5);const pct=td>0?Math.max(0,Math.min(100,(dl/td)*100)):0;const isRet=(data.returns||[]).some(r=>r.SaleID===sale.SaleID&&r.ProductID===sale.ProductID&&r.Status==='Completed');const status=isRet?'Returned':dl<=0?'Expired':dl<=30?'Expiring Soon':'Active';const ck=`${sale.SaleID}_${sale.ProductID}`;if(seen.has(ck))return null;seen.add(ck);return{key:`${ck}_${saleIdx}`,saleId:sale.SaleID,pid:sale.ProductID,name:sale.ProductName,brand:prod.Brand,cust:sale.CustomerName,phone:sale.CustomerPhone,sd:sale.Date,ex:ex.toISOString(),wm:prod.WarrantyMonths,dl:Math.max(0,dl),pct,status}}).filter(Boolean)},[data]);
  const filtered=useMemo(()=>recs.filter(w=>{const ms=!q||w.name.toLowerCase().includes(q.toLowerCase())||w.cust.toLowerCase().includes(q.toLowerCase())||w.saleId.toLowerCase().includes(q.toLowerCase())||(w.phone||'').includes(q);return ms&&(sf==='All'||w.status===sf)}),[recs,q,sf]);
  const cnt=useMemo(()=>{const c={Active:0,'Expiring Soon':0,Expired:0,Returned:0};recs.forEach(w=>{if(c[w.status]!==undefined)c[w.status]++});return c},[recs]);
  if(loading) return <div className="space-y-4"><div className="grid grid-cols-2 xl:grid-cols-4 gap-3"><SkC/><SkC/><SkC/><SkC/></div><SkT/></div>;
  const badge=s=>{const st={'Active':'text-emerald-700 bg-emerald-50 border-emerald-200','Expiring Soon':'text-amber-700 bg-amber-50 border-amber-200','Expired':'text-rose-700 bg-rose-50 border-rose-200','Returned':'text-slate-500 bg-slate-100 border-slate-200'};const dt={'Active':'bg-emerald-500','Expiring Soon':'bg-amber-500 animate-pulse-dot','Expired':'bg-rose-500','Returned':'bg-slate-400'};return(<span className={`inline-flex items-center gap-1 text-[10px] sm:text-[11px] font-semibold px-2 py-0.5 sm:px-2.5 sm:py-1 rounded-full border ${st[s]||st.Active}`}><span className={`w-1.5 h-1.5 rounded-full ${dt[s]||dt.Active}`}/>{s}</span>)};

  return (<div className="space-y-4 animate-fade-in">
    <div className="grid grid-cols-2 xl:grid-cols-4 gap-3"><SC title="Active" si="ක්‍රියාකාරී වගකීම්" value={cnt.Active} icon="shield-check" grad="from-emerald-400 to-emerald-600"/><SC title="Expiring" si="අවසන් වෙමින්" value={cnt['Expiring Soon']} icon="alert-triangle" grad="from-amber-400 to-amber-500" delay={80}/><SC title="Expired" si="කල් ඉකුත් වූ" value={cnt.Expired} icon="alert-circle" grad="from-rose-400 to-rose-600" delay={160}/><SC title="Total" si="සියලු වගකීම්" value={recs.length} icon="clipboard" grad="from-brand-400 to-brand-600" delay={240}/></div>
    <div className="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
      <div className="px-4 sm:px-5 py-3 sm:py-4 border-b border-slate-100"><div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 justify-between"><div className="relative w-full sm:w-72"><I n="search" s={15} c="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/><input type="text" placeholder="Search warranties... (වගකීම් සොයන්න)" value={q} onChange={e=>sQ(e.target.value)} className="w-full pl-9 pr-4 py-2.5 text-sm bg-slate-50 border border-slate-200 rounded-xl input-ring placeholder:text-slate-300"/></div><div className="flex gap-1.5 flex-wrap">{['All','Active','Expiring Soon','Expired','Returned'].map(s=>(<button key={s} onClick={()=>sSf(s)} className={`px-2 sm:px-3 py-1 sm:py-1.5 text-[10px] sm:text-[11px] font-semibold rounded-lg active:scale-95 ${sf===s?'bg-brand-600 text-white':'bg-slate-100 text-slate-500'}`}>{s}{s!=='All'&&<span className="ml-0.5 opacity-70">({cnt[s]||0})</span>}</button>))}</div></div></div>
      <div className="overflow-x-auto"><table className="w-full min-w-[600px]"><thead><tr className="bg-slate-50/80"><th className="text-left px-4 sm:px-5 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Product</th><th className="text-left px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Customer</th><th className="text-left px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Expires</th><th className="text-center px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Left</th><th className="text-center px-4 py-3 text-[10px] sm:text-[11px] font-semibold text-slate-500 uppercase">Status</th></tr></thead>
        <tbody>{filtered.length===0?<tr><td colSpan="5" className="px-6 py-14 text-center text-sm text-slate-400">වගකීම් වාර්තා නොමැත / No warranty records</td></tr>:filtered.map(w=>(<tr key={w.key} className="rh border-b border-slate-50"><td className="px-4 sm:px-5 py-3.5"><p className="text-sm font-semibold text-slate-800 truncate max-w-[170px]">{w.name}</p><span className="text-[10px] text-brand-500 font-mono bg-brand-50 px-1.5 py-0.5 rounded">{w.saleId}</span><span className="text-[10px] text-slate-300 ml-1">{w.wm}mo</span></td><td className="px-4 py-3.5"><p className="text-sm text-slate-700">{w.cust}</p><p className="text-[10px] text-slate-400">{w.phone}</p></td><td className="px-4 py-3.5 text-xs text-slate-500">{fD(w.ex)}</td><td className="px-4 py-3.5"><div className="flex flex-col items-center"><span className={`text-xs font-bold ${w.status==='Active'?'text-emerald-600':w.status==='Expiring Soon'?'text-amber-600':'text-slate-400'}`}>{w.status==='Expired'||w.status==='Returned'?'—':`${w.dl}d`}</span><div className="w-16 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden"><div className={`h-full rounded-full transition-all ${w.status==='Active'?'bg-emerald-500':w.status==='Expiring Soon'?'bg-amber-500':'bg-rose-500'}`} style={{width:`${w.pct}%`}}/></div></div></td><td className="px-4 py-3.5 text-center">{badge(w.status)}</td></tr>))}</tbody></table></div>
      {filtered.length>0&&<div className="px-4 py-2 bg-slate-50/50 border-t border-slate-100"><p className="text-[10px] text-slate-400">Showing {filtered.length} of {recs.length}</p></div>}
    </div>
  </div>);
};

/* ── APP ── */
const App=()=>{
  const [tab,setTab]=useState('dashboard');const [open,setOpen]=useState(false);const [data,setData]=useState(null);const [loading,setLoading]=useState(true);const [toasts,setToasts]=useState([]);const [cached,setCached]=useState(false);const dataLoadedRef=useRef(false);
  const toast=useCallback((msg,type='success')=>{const id=Date.now()+Math.random();setToasts(p=>[...p,{id,message:msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500)},[]);
  const rmToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  const lowCount=useMemo(()=>(data?.products||[]).filter(p=>p.Status==='Low Stock'||p.StockQty<=p.MinStockLevel).length,[data]);

  useEffect(()=>{if(data){saveToLS(data);dataLoadedRef.current=true}},[data]);
  const fetchData=useCallback(async()=>{setLoading(true);setCached(false);const lsData=loadFromLS();if(lsData&&!dataLoadedRef.current){setData(lsData);setCached(true);setLoading(false)}try{if(API_URL&&API_URL!=='YOUR_DEPLOYED_APPS_SCRIPT_URL_HERE'){const r=await fetch(API_URL);const j=await r.json();if(j.success&&j.data){setData(j.data);setCached(false);setLoading(false);return}}}catch(e){console.warn('API unavailable:',e.message)}if(!dataLoadedRef.current&&!lsData){setTimeout(()=>{setData(MOCK);setLoading(false)},600)}else{setLoading(false)}},[]);
  useEffect(()=>{fetchData()},[fetchData]);

  return (<div className="min-h-screen bg-slate-50">
    <Sidebar tab={tab} setTab={setTab} open={open} setOpen={setOpen} lowCount={lowCount}/>
    <div className="lg:ml-[280px] min-h-screen flex flex-col">
      <Header tab={tab} setOpen={setOpen} onRefresh={fetchData} loading={loading} cached={cached}/>
      <main className="flex-1 p-3 sm:p-6 lg:p-8">
        {tab==='dashboard'&&<Dashboard data={data} loading={loading} setTab={setTab}/>}
        {tab==='products'&&<Products data={data} loading={loading} toast={toast} setData={setData} setTab={setTab}/>}
        {tab==='add-product'&&<AddProduct data={data} loading={loading} toast={toast} setData={setData} setTab={setTab}/>}
        {tab==='new-sale'&&<NewSale data={data} loading={loading} toast={toast} setData={setData}/>}
        {tab==='returns'&&<Returns data={data} loading={loading} toast={toast} setData={setData}/>}
        {tab==='warranty'&&<Warranty data={data} loading={loading}/>}
      </main>
      <footer className="px-3 sm:px-8 py-3 sm:py-4 border-t border-slate-200 bg-white/60 backdrop-blur-sm"><div className="flex flex-col sm:flex-row items-center justify-between gap-1 sm:gap-2"><p className="text-[10px] sm:text-[11px] text-slate-400">&copy; {new Date().getFullYear()} <span className="font-semibold text-slate-500">Mahesh Web App Solution</span></p><p className="text-[9px] sm:text-[10px] text-slate-300">Liyanage Electronics (ලියනගේ ඉලෙක්ට්‍රොනික්ස්)</p></div></footer>
    </div>
    <Toasts toasts={toasts} rm={rmToast}/>
  </div>);
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
